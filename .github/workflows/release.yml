name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match pyproject.toml, e.g. 1.2.3)"
        required: true
        type: string

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    # Only allow releases from the default branch of the canonical repository
    if: >
      github.repository == 'MartijnVanbiervliet/snapperable' &&
      github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify input version matches pyproject.toml
        run: |
          if [ "${{ inputs.version }}" != "${{ steps.get-version.outputs.version }}" ]; then
            echo "::error::Input version '${{ inputs.version }}' does not match pyproject.toml version '${{ steps.get-version.outputs.version }}'"
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag 'v${{ inputs.version }}' already exists on the remote. Bump the version in pyproject.toml before releasing."
            exit 1
          fi

  build:
    name: Build distribution packages
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies and run linters
        run: |
          uv sync --locked --all-extras --dev
          uv run ruff check .

      - name: Run tests
        run: uv run pytest tests

      - name: Build wheel and sdist
        run: uv build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/snapperable
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/snapperable
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create a release and upload assets
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            dist/*
